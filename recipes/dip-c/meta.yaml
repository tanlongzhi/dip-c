{% set name = "dip-c" %}
{% set version = "1.9.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/run-dipc/run_dipc-{{ version }}.tar.gz
  sha256: PLACEHOLDER  # Update after uploading to PyPI

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  entry_points:
    - dip-c = dip_c.cli:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68
  run:
    - python >=3.9
    - numpy >=1.22,<2
    - scipy >=1.7,<1.15
    - rmsd >=1.5
    - mmcif-pdbx >=2.0

test:
  imports:
    - dip_c
  commands:
    - dip-c --help

about:
  home: https://github.com/tanlongzhi/dip-c
  license: MIT
  license_file: LICENSE
  summary: Diploid chromatin conformation capture analysis

extra:
  recipe-maintainers:
    - conchoecia
