{% set name = "dip-c" %}
{% set version = "1.9.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/run-dipc/run_dipc-{{ version }}.tar.gz
  sha256: PLACEHOLDER  # Update after uploading to PyPI

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  entry_points:
    - dip-c = dip_c.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68
    - setuptools-scm >=8
  run:
    - python >=3.9
    - numpy >=1.22
    - scipy >=1.7
    - rmsd >=1.5
    - mmcif_pdbx >=2.0

test:
  imports:
    - dip_c
  commands:
    - dip-c --help

about:
  home: https://github.com/tanlongzhi/dip-c
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Diploid chromatin conformation capture analysis
  description: |
    Dip-C reconstructs 3D diploid genomes from single-cell Hi-C data.
    It phases contacts, imputes missing data, and generates 3D structures
    for visualization and analysis.
  identifiers:
    - doi:10.1126/science.aat5641

extra:
  recipe-maintainers:
    - conchoecia
