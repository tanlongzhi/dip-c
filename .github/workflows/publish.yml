name: Publish to PyPI
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        include:
          - {os: ubuntu-latest, python-version: "3.10"}
          - {os: ubuntu-latest, python-version: "3.11"}
          - {os: ubuntu-latest, python-version: "3.12"}
          - {os: ubuntu-latest, python-version: "3.13"}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ".[dev]"
      - run: pytest tests/ -k "not FullGenome" -v --tb=short --cov=dip_c --cov-report=term

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches VERSION
        run: |
          test "v$(cat VERSION)" = "$GITHUB_REF_NAME" \
            || { echo "::error::tag $GITHUB_REF_NAME != v$(cat VERSION) in VERSION file"; exit 1; }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Print SHA256 for conda recipe
        run: sha256sum dist/run_dipc-*.tar.gz
      - uses: pypa/gh-action-pypi-publish@release/v1
