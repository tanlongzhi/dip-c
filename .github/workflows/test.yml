name: Tests
on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      full_genome:
        description: "Run full genome tests"
        type: boolean
        default: false
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, python-version: "3.10"}
          - {os: ubuntu-latest, python-version: "3.11"}
          - {os: ubuntu-latest, python-version: "3.12"}
          - {os: ubuntu-latest, python-version: "3.13"}
          - {os: macos-latest, python-version: "3.12"}
          - {os: macos-latest, python-version: "3.13"}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ".[dev,hicplot]" cooler
      # Python 3.13: run without coverage (pysam + coverage.py + 3.13 causes segfault)
      - run: pytest tests/ -v --tb=short
        if: inputs.full_genome == true && matrix.python-version == '3.13'
      - run: pytest tests/ -k "not FullGenome" -v --tb=short
        if: inputs.full_genome != true && matrix.python-version == '3.13'

      # Python 3.10-3.12: run with coverage
      - run: pytest tests/ -v --tb=short --cov=dip_c --cov-report=xml:coverage.xml --cov-report=term
        if: inputs.full_genome == true && matrix.python-version != '3.13'
      - run: pytest tests/ -k "not FullGenome" -v --tb=short --cov=dip_c --cov-report=xml:coverage.xml --cov-report=term
        if: inputs.full_genome != true && matrix.python-version != '3.13'

      # Generate and commit coverage badge (ubuntu + python 3.12, master only)
      - name: Generate coverage badge
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && github.ref == 'refs/heads/master'
        run: |
          pip install "genbadge[coverage]"
          genbadge coverage -i coverage.xml -o images/coverage-badge.svg
      - name: Commit coverage badge
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update coverage badge [skip ci]"
          file_pattern: images/coverage-badge.svg
